# 训练超参配置

# ==================== RSSM 配置 ====================
rssm:
  deter: 512
  stoch: 32
  discrete: 32          # K-tuple categorical
  hidden: 512
  unimix_ratio: 0.01
  min_std: 0.1
  initial: 'learned'
  action_clip: 1.0

# ==================== Residual 配置 ====================
residual:
  # Stage 1: 3 层 MLP(对齐 ReDRAW ensemble_residual 简化版)
  stage1_n_layers: 3
  stage1_hidden: 64

  # Stage 2: 1 层 MLP(对齐 ReDRAW ensemble_residual_extra_small_1_member)
  stage2_n_layers: 1
  stage2_hidden: 64

  # DynamicsResidual(基于 history)
  history_len: 4        # K=4 步历史
  dynamics_hidden: 128  # 比 PhysicalResidual 大

  # 初始化(对齐 ReDRAW:严格零初始化)
  init: 'zero'

  # Stage 2 学习率(100x normal)
  stage2_lr: 1.0e-2

# ==================== Encoder/Decoder ====================
encoder:
  mlp_layers: 5
  mlp_units: 1024
  act: 'silu'
  norm: 'layer'

decoder:
  mlp_layers: 5
  mlp_units: 1024
  act: 'silu'
  norm: 'layer'

# ==================== Actor-Critic ====================
actor:
  layers: 2
  units: 512
  lr: 3.0e-5
  entropy_scale: 1.0e-3
  std_min: 0.1
  std_max: 1.0

critic:
  layers: 2
  units: 512
  lr: 3.0e-5
  slow_target_update: 1
  slow_target_fraction: 0.02

# ==================== 训练超参 ====================
training:
  batch_size: 512
  batch_length: 50
  imag_horizon: 15
  gamma: 0.997
  lambda_: 0.95
  grad_clip: 1000.0
  model_lr: 1.0e-4
  adam_eps: 1.0e-8

# ==================== Stage 设置 ====================
stage1:
  total_steps: 2_000_000
  eval_every: 50_000
  eval_episodes: 32
  ckpt_every: 100_000

stage2:
  total_steps: 1_000_000
  eval_every: 50_000
  eval_episodes: 32
  ckpt_every: 100_000
  # 伪 real 数据采集
  collect_episodes: 200

# ==================== 评估 ====================
evaluation:
  num_episodes: 50
  max_episode_steps: 1000